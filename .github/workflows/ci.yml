name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Ruff check
        run: python -m ruff check drissionpage_mcp tests playground

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Parse pyproject
        run: python -c "import tomllib; tomllib.load(open('pyproject.toml','rb'))"
        if: matrix.python-version != '3.10'
      - name: Parse pyproject on Python 3.10
        run: python -c "import tomli; tomli.load(open('pyproject.toml','rb'))"
        if: matrix.python-version == '3.10'
      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_server.py \
            tests/test_tools.py \
            tests/test_response_contract.py \
            tests/test_doctor.py \
            tests/test_tool_schema_snapshot.py \
            tests/test_release_metadata.py \
            tests/test_playground_mcp_lab.py \
            tests/test_ci_workflow.py

  protocol:
    name: MCP protocol tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run MCP protocol tests
        run: |
          python -m pytest \
            tests/test_mcp_protocol.py \
            tests/test_mcp_resources.py \
            tests/test_mcp_prompts.py

  evals:
    name: MCP eval harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run deterministic evals
        run: python -m pytest tests/evals -q

  coverage:
    name: Coverage and Codecov
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
          BROWSER_BIN="$(command -v chromium-browser || command -v chromium || true)"
          test -n "$BROWSER_BIN"
          echo "CHROME_PATH=$BROWSER_BIN" >> "$GITHUB_ENV"
          "$BROWSER_BIN" --version
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests with coverage
        env:
          DP_HEADLESS: "1"
          DP_NO_SANDBOX: "1"
          DP_MCP_REQUIRE_BROWSER: "1"
        run: |
          python -m pytest tests/ \
            --cov=drissionpage_mcp \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: all-tests
          name: python-3.11
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  package:
    name: Package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tools
        run: python -m pip install -e ".[dev]"
      - name: Build package
        run: python -m build
      - name: Check wheel package contents
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheels = glob.glob("dist/*.whl")
          assert len(wheels) == 1, wheels
          with zipfile.ZipFile(wheels[0]) as wheel:
              names = wheel.namelist()
              top_level_file = next(
                  name for name in names if name.endswith(".dist-info/top_level.txt")
              )
              top_level = wheel.read(top_level_file).decode().splitlines()

          assert top_level == ["drissionpage_mcp"], top_level
          assert not any(name == "src/" or name.startswith("src/") for name in names)
          PY
      - name: Check package metadata
        run: python -m twine check dist/*

  browser-integration:
    name: Browser integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
          BROWSER_BIN="$(command -v chromium-browser || command -v chromium || true)"
          test -n "$BROWSER_BIN"
          echo "CHROME_PATH=$BROWSER_BIN" >> "$GITHUB_ENV"
          "$BROWSER_BIN" --version
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Tool registry smoke
        run: python playground/run_mcp_lab.py --case registry --json
      - name: Run browser integration fixture tests
        env:
          DP_HEADLESS: "1"
          DP_NO_SANDBOX: "1"
          DP_MCP_REQUIRE_BROWSER: "1"
        run: python -m pytest tests/test_browser_integration.py
