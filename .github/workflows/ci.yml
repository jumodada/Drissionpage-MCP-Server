name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Ruff check
        run: python -m ruff check drissionpage_mcp tests playground
      - name: Enforce pre-0.8 production LOC budget
        run: |
          BASELINE=e0b8805
          NET_PRODUCTION_LOC="$({
            git diff --numstat "$BASELINE" HEAD -- \
              ':(glob)drissionpage_mcp/**/*.py'
          } | awk '{ added += $1; deleted += $2 } END { print added - deleted }')"
          echo "Production LOC net growth from $BASELINE: $NET_PRODUCTION_LOC"
          test "$NET_PRODUCTION_LOC" -le 200

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Parse pyproject
        run: python -c "import tomllib; tomllib.load(open('pyproject.toml','rb'))"
        if: matrix.python-version != '3.10'
      - name: Parse pyproject on Python 3.10
        run: python -c "import tomli; tomli.load(open('pyproject.toml','rb'))"
        if: matrix.python-version == '3.10'
      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_server.py \
            tests/test_tools.py \
            tests/test_response_contract.py \
            tests/test_doctor.py \
            tests/test_tool_schema_snapshot.py \
            tests/test_release_metadata.py \
            tests/test_playground_mcp_lab.py \
            tests/test_ci_workflow.py

  protocol:
    name: MCP protocol tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run MCP protocol tests
        run: |
          python -m pytest \
            tests/test_mcp_protocol.py \
            tests/test_mcp_resources.py \

  evals:
    name: MCP eval harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run deterministic evals
        run: python -m pytest tests/evals -q

  benchmark:
    name: W01-W08 reliability benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Locate Chrome or Chromium
        run: |
          BROWSER_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$BROWSER_BIN" ]; then
            sudo apt-get update
            sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
            BROWSER_BIN="$(command -v chromium || command -v chromium-browser || true)"
          fi
          test -n "$BROWSER_BIN"
          echo "CHROME_PATH=$BROWSER_BIN" >> "$GITHUB_ENV"
          "$BROWSER_BIN" --version
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run W01-W08 ten-run reliability benchmark
        env:
          DP_HEADLESS: "1"
          DP_NO_SANDBOX: "1"
          DP_MCP_REQUIRE_BROWSER: "1"
          TMPDIR: ${{ runner.temp }}
        run: |
          python -m tests.evals.task_completion_benchmark \
            --iterations 10 \
            --output benchmark-results/0.7.4-task-completion.json
      - name: Upload task-completion benchmark
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 0.7.4-task-completion-benchmark
          path: benchmark-results/0.7.4-task-completion.json
          if-no-files-found: warn

  browser-boundaries:
    name: Input and document boundaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            no_sandbox: "1"
          - os: macos-latest
            no_sandbox: "0"
          - os: windows-latest
            no_sandbox: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run focused browser capability boundaries
        env:
          DP_HEADLESS: "1"
          DP_NO_SANDBOX: ${{ matrix.no_sandbox }}
          DP_MCP_REQUIRE_BROWSER: "1"
        run: python -m pytest tests/test_browser_capability_boundaries.py -q

  coverage:
    name: Coverage and browser integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DP_TEST_SITE_URL: http://127.0.0.1:4321
      RUN_PRIVATE_TEST_SITE: ${{ github.event_name != 'pull_request' && secrets.DP_PRIVATE_FIXTURE_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Checkout shared DrissionPage test site
        uses: actions/checkout@v4
        with:
          repository: jumodada/DrissionPage-test-site
          path: DrissionPage-test-site
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Locate Chrome or Chromium
        run: |
          BROWSER_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$BROWSER_BIN" ]; then
            sudo apt-get update
            sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
            BROWSER_BIN="$(command -v chromium || command -v chromium-browser || true)"
          fi
          test -n "$BROWSER_BIN"
          echo "CHROME_PATH=$BROWSER_BIN" >> "$GITHUB_ENV"
          "$BROWSER_BIN" --version
      - name: Set up Node for shared test site
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: DrissionPage-test-site/package-lock.json
      - name: Build shared DrissionPage test site
        working-directory: DrissionPage-test-site
        run: |
          npm ci
          npm run build
      - name: Start shared DrissionPage test site
        working-directory: DrissionPage-test-site
        run: |
          nohup npm run dev -- --host 127.0.0.1 --port 4321 > "$RUNNER_TEMP/drissionpage-test-site.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/drissionpage-test-site.pid"
          for _ in $(seq 1 60); do
            if curl -fsS "$DP_TEST_SITE_URL/api/health.json" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/drissionpage-test-site.log"
          exit 1
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Tool registry smoke
        run: python playground/run_mcp_lab.py --case registry --json
      - name: Run tests with coverage
        env:
          DP_HEADLESS: "1"
          DP_NO_SANDBOX: "1"
          DP_MCP_REQUIRE_BROWSER: "1"
        run: |
          python -m pytest tests/ \
            --cov=drissionpage_mcp \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
      - name: Run private shared DrissionPage test-site smoke
        if: ${{ env.RUN_PRIVATE_TEST_SITE == 'true' }}
        env:
          DP_HEADLESS: "1"
          DP_NO_SANDBOX: "1"
          DP_MCP_REQUIRE_BROWSER: "1"
          DP_TEST_SITE_URL: ${{ secrets.DP_PRIVATE_FIXTURE_URL }}
        run: |
          python - <<'PY'
          import os
          from urllib.parse import parse_qsl, urlsplit

          url = os.environ["DP_TEST_SITE_URL"].strip()
          parsed = urlsplit(url)
          tokens = {url, parsed.netloc}
          if parsed.scheme and parsed.netloc:
              tokens.add(f"{parsed.scheme}://{parsed.netloc}")
          for key, value in parse_qsl(parsed.query, keep_blank_values=True):
              key = key.lower()
              if value and (
                  len(value) > 12
                  or "secret" in key
                  or "token" in key
                  or "key" in key
                  or "bypass" in key
                  or "sig" in key
              ):
                  tokens.add(value)
          for token in sorted(token for token in tokens if token):
              print(f"::add-mask::{token}")
          PY
          python -m pytest tests/test_browser_integration.py -k shared_drissionpage_test_site -q
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: all-tests
          name: python-3.11
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  package:
    name: Package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tools
        run: python -m pip install -e ".[dev]"
      - name: Build package
        run: python -m build
      - name: Check wheel package contents
        run: |
          python - <<'PY'
          import glob
          import tarfile
          import zipfile

          wheels = glob.glob("dist/*.whl")
          sdists = glob.glob("dist/*.tar.gz")
          assert len(wheels) == 1, wheels
          assert len(sdists) == 1, sdists
          with zipfile.ZipFile(wheels[0]) as wheel:
              wheel_names = wheel.namelist()
              top_level_file = next(
                  name for name in wheel_names if name.endswith(".dist-info/top_level.txt")
              )
              top_level = wheel.read(top_level_file).decode().splitlines()
          with tarfile.open(sdists[0], "r:gz") as sdist:
              sdist_names = sdist.getnames()

          assert top_level == ["drissionpage_mcp"], top_level
          assert not any(name == "src/" or name.startswith("src/") for name in wheel_names)

          forbidden_suffixes = (
              "/AGENTS.md",
              "/SKILL.md",
              "/docs/core-and-skills-strategy.md",
              "/docs/0.7.3-to-0.8.0-capability-plan.md",
              "/drissionpage_mcp/prompts.py",
              "/drissionpage_mcp/browser/vision.py",
              "/drissionpage_mcp/browser/workflows.py",
              "/drissionpage_mcp/tools/vision.py",
              "/drissionpage_mcp/tools/workflow.py",
          )
          for names in (wheel_names, sdist_names):
              assert not any(
                  ("/" + name).endswith(forbidden_suffixes)
                  or "/skills/" in ("/" + name)
                  or "/.omx/" in ("/" + name)
                  for name in names
              ), names
          PY
      - name: Check package metadata
        run: python -m twine check dist/*
