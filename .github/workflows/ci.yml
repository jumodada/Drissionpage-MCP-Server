name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Ruff check
        run: python -m ruff check drissionpage_mcp tests playground

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Parse pyproject
        run: python -c "import tomllib; tomllib.load(open('pyproject.toml','rb'))"
        if: matrix.python-version != '3.10'
      - name: Parse pyproject on Python 3.10
        run: python -c "import tomli; tomli.load(open('pyproject.toml','rb'))"
        if: matrix.python-version == '3.10'
      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_server.py \
            tests/test_tools.py \
            tests/test_response_contract.py \
            tests/test_doctor.py \
            tests/test_tool_schema_snapshot.py \
            tests/test_ci_workflow.py

  protocol:
    name: MCP protocol tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run MCP protocol tests
        run: python -m pytest tests/test_mcp_protocol.py

  coverage:
    name: Coverage and Codecov
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=drissionpage_mcp \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: all-tests
          name: python-3.11
          use_oidc: true
          fail_ci_if_error: true

  package:
    name: Package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tools
        run: python -m pip install -e ".[dev]"
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*

  browser-integration:
    name: Browser integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Tool registry smoke
        run: python playground/quick_start.py
      - name: Run browser integration fixture tests
        run: python -m pytest tests/test_browser_integration.py
